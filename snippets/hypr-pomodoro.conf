# Pomodoro (uair) keybindings.
# Sourced from hyprland.conf via:  source = ~/.config/hypr/pomodoro.conf

bindd = SUPER ALT, P, Pomodoro start/stop, exec, $HOME/.local/bin/uair-toggle
bindd = SUPER ALT, N, Pomodoro next session, exec, uairctl next
bindd = SUPER ALT, B, Pomodoro previous session, exec, uairctl prev
bindd = SUPER ALT, R, Pomodoro restart cycle, exec, uairctl jump work-1
